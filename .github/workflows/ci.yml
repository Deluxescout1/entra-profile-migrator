name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Unit tests are fully mocked ("run anywhere" per tests/EntraProfileMigrator.Tests.ps1),
  # so they run on Linux/pwsh too — fast and cheap. This also proves the module loads on
  # PowerShell 7. Integration/RequiresWindows tests are excluded by tag and stay VM-only.
  test-linux:
    name: Unit tests (ubuntu / pwsh 7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $c = New-PesterConfiguration
          $c.Run.Path          = 'tests'
          $c.Run.Exit          = $true
          $c.Filter.ExcludeTag = 'Integration', 'RequiresWindows'
          $c.Output.Verbosity  = 'Detailed'
          Invoke-Pester -Configuration $c

  # Windows PowerShell 5.1 — the module's documented minimum. Real-fidelity check that the
  # module loads and the mocked unit tests pass on the oldest supported runtime.
  test-windows:
    name: Unit tests (windows / PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $c = New-PesterConfiguration
          $c.Run.Path          = 'tests'
          $c.Run.Exit          = $true
          $c.Filter.ExcludeTag = 'Integration', 'RequiresWindows'
          $c.Output.Verbosity  = 'Detailed'
          Invoke-Pester -Configuration $c
