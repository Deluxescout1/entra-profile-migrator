name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Unit tests are fully mocked ("run anywhere" per tests/EntraProfileMigrator.Tests.ps1),
  # so they run on Linux/pwsh too — fast and cheap. Integration/RequiresWindows tests are
  # excluded by tag and stay VM-only.
  test-linux:
    name: Unit tests (ubuntu / pwsh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $c = New-PesterConfiguration
          $c.Run.Path          = 'tests'
          $c.Run.Exit          = $true
          $c.Filter.ExcludeTag = 'Integration', 'RequiresWindows'
          $c.Output.Verbosity  = 'Detailed'
          Invoke-Pester -Configuration $c

  # Windows gives real fidelity: proves the module loads on Windows PowerShell 5.1 (its
  # documented minimum) and on PowerShell 7.
  test-windows:
    name: Unit tests (windows / ${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [ powershell, pwsh ]
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: ${{ matrix.shell }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Run unit tests
        shell: ${{ matrix.shell }}
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $c = New-PesterConfiguration
          $c.Run.Path          = 'tests'
          $c.Run.Exit          = $true
          $c.Filter.ExcludeTag = 'Integration', 'RequiresWindows'
          $c.Output.Verbosity  = 'Detailed'
          Invoke-Pester -Configuration $c
