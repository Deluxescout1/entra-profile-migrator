name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Unit tests (${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # powershell = Windows PowerShell 5.1 (the module's documented minimum)
        # pwsh       = PowerShell 7+
        shell: [ powershell, pwsh ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester 5
        shell: ${{ matrix.shell }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run unit tests (Integration/RequiresWindows excluded)
        shell: ${{ matrix.shell }}
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path             = 'tests'
          $config.Run.Exit             = $true     # non-zero exit fails the job
          $config.Filter.ExcludeTag    = 'Integration', 'RequiresWindows'
          $config.Output.Verbosity     = 'Detailed'
          $config.TestResult.Enabled   = $true
          $config.TestResult.OutputPath = 'testresults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results-${{ matrix.shell }}
          path: testresults.xml
          if-no-files-found: warn
