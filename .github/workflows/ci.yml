name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# This module is Windows-only and its unit tests mock Windows binaries (reg.exe,
# icacls.exe) and use C:\ paths, so they require a Windows host (but never mutate
# anything — Integration/RequiresWindows tests are excluded by tag and stay VM-only).
# We run on both PowerShell editions: Windows PowerShell 5.1 (the documented
# minimum) and PowerShell 7.

jobs:
  test-ps51:
    name: Unit tests (Windows PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Pester 5
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Syntax check (parse all scripts)
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem -Path src, tools, deploy, tests -Recurse -Include *.ps1, *.psm1, *.psd1 | ForEach-Object {
            $t = $null; $e = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$t, [ref]$e)
            if ($e -and $e.Count) {
              $failed = $true
              Write-Host "PARSE ERRORS: $($_.FullName)"
              $e | ForEach-Object { Write-Host ("  line {0}: {1}" -f $_.Extent.StartLineNumber, $_.Message) }
            } else {
              Write-Host "ok  $($_.FullName)"
            }
          }
          if ($failed) { exit 1 }
      - name: Run unit tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $c = New-PesterConfiguration
          $c.Run.Path          = 'tests'
          $c.Run.Exit          = $true
          $c.Filter.ExcludeTag = 'Integration', 'RequiresWindows'
          $c.Output.Verbosity  = 'Detailed'
          Invoke-Pester -Configuration $c

  test-ps7:
    name: Unit tests (PowerShell 7)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
      - name: Syntax check (parse all scripts)
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path src, tools, deploy, tests -Recurse -Include *.ps1, *.psm1, *.psd1 | ForEach-Object {
            $t = $null; $e = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$t, [ref]$e)
            if ($e -and $e.Count) {
              $failed = $true
              Write-Host "PARSE ERRORS: $($_.FullName)"
              $e | ForEach-Object { Write-Host ("  line {0}: {1}" -f $_.Extent.StartLineNumber, $_.Message) }
            } else {
              Write-Host "ok  $($_.FullName)"
            }
          }
          if ($failed) { exit 1 }
      - name: Run unit tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $c = New-PesterConfiguration
          $c.Run.Path          = 'tests'
          $c.Run.Exit          = $true
          $c.Filter.ExcludeTag = 'Integration', 'RequiresWindows'
          $c.Output.Verbosity  = 'Detailed'
          Invoke-Pester -Configuration $c
